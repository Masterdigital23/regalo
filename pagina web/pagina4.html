<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Un detalle para ti 💕</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Arial', sans-serif; 
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #fad0c4 100%);
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            text-align: center; 
            overflow: hidden;
            padding: 20px;
        }
        .particulas { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            pointer-events: none; 
            z-index: 1; 
        }
        .particula { 
            position: absolute; 
            font-size: 20px; 
            animation: float 6s infinite linear; 
            opacity: 0.8;
        }
        @keyframes float { 
            0% { transform: translateY(100vh) rotate(0deg); opacity: 1; } 
            100% { transform: translateY(-100px) rotate(360deg); opacity: 0; } 
        }
        h1 {
            font-size: 30px;
            margin-bottom: 10px;
            color: #c2185b;
            font-weight: 600;
            text-shadow: 0 1px 2px rgba(0,0,0,0.1);
            animation: fade-in 0.9s ease-out;
        }
        .personaje { 
            width: 220px; 
            height: 220px; 
            margin: 20px auto 20px; 
            border-radius: 15px; 
            box-shadow: 0 10px 30px rgba(255,182,193,0.6); 
            animation: fade-in 0.9s ease-out;
        }
        .mensaje { 
            font-size: 22px; 
            color: #d63384; 
            margin-bottom: 30px; 
            line-height: 1.5;
            font-weight: 500;
            text-shadow: 0 1px 2px rgba(0,0,0,0.1);
            animation: fade-in 1.1s ease-out;
        }
        .btn { 
            background: linear-gradient(45deg, #ff69b4, #ff1493); 
            color: white; 
            border: none; 
            padding: 15px 40px; 
            font-size: 18px; 
            border-radius: 50px; 
            cursor: pointer; 
            box-shadow: 0 8px 20px rgba(255,105,180,0.4); 
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); 
            margin: 10px; 
            font-weight: 500;
        }
        .btn:hover { 
            transform: translateY(-4px); 
            box-shadow: 0 12px 25px rgba(255,105,180,0.7); 
        }
        @keyframes fade-in {
            0% { opacity: 0; transform: translateY(15px); }
            100% { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

<body>
    <div class="particulas" id="particulas"></div>

    <h1>Un detalle para ti 💕</h1>
    <img src="img/stich dando rosa act.png" alt="Detallito especial" class="personaje">
    <div class="mensaje">
        No importa lo que pase,<br>
        siempre hay un espacio para ti aquí y como no puede faltar una rosa para otra rosa❤️.
    </div>

    <button class="btn" onclick="continuar('pagina5.html')">Continuar</button>
    <button class="btn" onclick="continuar('index.html')">Volver al inicio</button>

    <script>
        function continuar(pagina) {
            window.location.href = pagina;
        }
    </script>
</body>
</html>
