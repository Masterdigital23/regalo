<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio 💕</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Arial', sans-serif; 
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #fad0c4 100%);
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: flex-start; 
            padding-top: 60px; 
            overflow: hidden;
        }

        /* Ajuste extra para móviles (font-size menor si la pantalla es muy pequeña) */
        @media (max-width: 480px) {
        h1 {
        font-size: 26px;
        }
        .mensaje {
        font-size: 20px;
        }
        .btn {
        padding: 14px 30px;
        font-size: 16px;
        }
        }

        body {
        padding: 20px 15px; /* deja un pequeño márgen en móviles */
        }
        .particulas { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            pointer-events: none; 
            z-index: 1; 
        }
        .particula { 
            position: absolute; 
            font-size: 20px; 
            animation: float 6s infinite linear; 
            opacity: 0.8;
        }
        @keyframes float { 
            0% { transform: translateY(100vh) rotate(0deg); opacity: 1; } 
            100% { transform: translateY(-100px) rotate(360deg); opacity: 0; } 
        }
        .personaje { 
            width: 160px; 
            height: 160px; 
            margin-bottom: 30px; 
            border-radius: 15px; 
            box-shadow: 0 8px 15px rgba(255,182,193,0.6); 
        }
        .texto-tipo {
        font-size: 24px; 
        color: #d63384; 
        line-height: 1.6; 
        text-align: center; 
        max-width: 400px; 
        margin: 0 auto 20px;
        white-space: normal;
        overflow: hidden;
        border-right: 2px solid #d63384;
        animation: type 5s steps(100, end), blink 0.8s step-start infinite;
        }
        @keyframes type {
        from { width: 0; }
        to { width: 100%; }
        }
        @keyframes blink {
        0%, 100% { border-color: transparent; }
        50% { border-color: #d63384; }
        }
        .btn { 
            background: linear-gradient(45deg, #ff69b4, #ff1493); 
            color: white; 
            border: none; 
            padding: 15px 40px; 
            font-size: 18px; 
            border-radius: 50px; 
            cursor: pointer; 
            box-shadow: 0 8px 20px rgba(255,105,180,0.4); 
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); 
            margin-top: 30px; 
            font-weight: 500;
        }
        .btn:hover { 
            transform: translateY(-4px); 
            box-shadow: 0 12px 25px rgba(255,105,180,0.7); 
        }
    </style>
</head>

<body>
    <div class="particulas" id="particulas"></div>

    <img src="img/stich saludando.png" alt="Monito saludando" class="personaje">

    <div class="texto-tipo">
        ¡Hola!, se que no te encuentras muy bien, pero para eso me crearon soy tu animador virtual, cada vez que te sientas mal vuelve me estaran actualizando costantemente, una carita triste me pone triste tambien. 💕
    </div>

    <button class="btn" onclick="continuar('pagina2.html')">
        Empezar
    </button>

    <script>
        function continuar(pagina) {
            window.location.href = pagina;
        }
    </script>
</body>
</html>
